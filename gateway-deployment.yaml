# CloudCUST — Nginx API Gateway Kubernetes Deployment
# Apply: kubectl apply -f k8s/gateway-deployment.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: cloudcust
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      upstream auth_backend   { server auth-service:5001; }
      upstream course_backend { server course-service:5002; }
      upstream exam_backend   { server exam-service:5003; }
      server {
        listen 80;
        location /api/auth/   { proxy_pass http://auth_backend/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/course/ { proxy_pass http://course_backend/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/exam/   { proxy_pass http://exam_backend/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location / { root /usr/share/nginx/html; index index.html; try_files $uri $uri/ /index.html; }
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudcust-frontend
  namespace: cloudcust
# Note: For the full frontend, copy frontend/index.html into the pod via an initContainer
# or serve it from a mounted ConfigMap. For Minikube demo, NodePort access is sufficient.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  namespace: cloudcust
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: cloudcust
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
