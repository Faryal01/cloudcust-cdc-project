events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream auth_backend   { server auth-service:5001; }
    upstream course_backend { server course-service:5002; }
    upstream exam_backend   { server exam-service:5003; }

    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://auth_backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
        location /api/course/ {
            proxy_pass http://course_backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
        }
        location /api/exam/ {
            proxy_pass http://exam_backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
        }
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
