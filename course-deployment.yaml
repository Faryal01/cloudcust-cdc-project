# CloudCUST — Course Registration Service Kubernetes Deployment
# Apply: kubectl apply -f k8s/course-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-deployment
  namespace: cloudcust
  labels:
    app: course-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
        - name: course-service
          image: cloudcust/course-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudcust-db-secret
                  key: database-url
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  namespace: cloudcust
spec:
  selector:
    app: course-service
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP
