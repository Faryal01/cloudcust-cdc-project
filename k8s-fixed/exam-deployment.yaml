apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-deployment
  namespace: cloudcust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam
  template:
    metadata:
      labels:
        app: exam
    spec:
      containers:
      - name: exam-service
        image: files_cdc_project-exam-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgresql://cloudcust:cloudcust123@db:5432/cloudcust
        - name: AUTH_SERVICE_URL
          value: http://auth-service:5001
        - name: COURSE_SERVICE_URL
          value: http://course-service:5002
        ports:
        - containerPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: exam-service
  namespace: cloudcust
spec:
  selector:
    app: exam
  ports:
  - port: 5003
    targetPort: 5003