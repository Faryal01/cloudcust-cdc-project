apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-deployment
  namespace: cloudcust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course
  template:
    metadata:
      labels:
        app: course
    spec:
      containers:
      - name: course-service
        image: files_cdc_project-course-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgresql://cloudcust:cloudcust123@db:5432/cloudcust
        - name: AUTH_SERVICE_URL
          value: http://auth-service:5001
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  namespace: cloudcust
spec:
  selector:
    app: course
  ports:
  - port: 5002
    targetPort: 5002