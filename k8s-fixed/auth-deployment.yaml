apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: cloudcust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth-service
        image: files_cdc_project-auth-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgresql://cloudcust:cloudcust123@db:5432/cloudcust
        - name: JWT_SECRET
          value: cloudcust_secret_key_2026
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cloudcust
spec:
  selector:
    app: auth
  ports:
  - port: 5001
    targetPort: 5001