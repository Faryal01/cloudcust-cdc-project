# CloudCUST — GitHub Actions CI/CD Pipeline
# Triggers on every push and on PRs targeting main or dev
# Jobs: lint → build → smoke test

name: CloudCUST CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:

  # ── 1. Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint auth service
        run: flake8 services/auth/app.py --max-line-length=120

      - name: Lint course service
        run: flake8 services/course/app.py --max-line-length=120

      - name: Lint exam service
        run: flake8 services/exam/app.py --max-line-length=120

  # ── 2. Build Docker images ──────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build auth image
        run: docker build -t cloudcust/auth-service:ci ./services/auth

      - name: Build course image
        run: docker build -t cloudcust/course-service:ci ./services/course

      - name: Build exam image
        run: docker build -t cloudcust/exam-service:ci ./services/exam

  # ── 3. Smoke Test via Docker Compose ────────────────────────────────
  smoke-test:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting 25s for DB + services to start..."
          sleep 25

      - name: Health check — auth
        run: curl -f http://localhost:5001/health

      - name: Health check — course
        run: curl -f http://localhost:5002/health

      - name: Health check — exam
        run: curl -f http://localhost:5003/health

      - name: Test login endpoint
        run: |
          curl -f -X POST http://localhost:5001/login \
            -H "Content-Type: application/json" \
            -d '{"username":"s001","password":"student123"}'

      - name: Tear down
        if: always()
        run: docker compose down -v
